<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="noise"></div>
  <div class="grid-bg"></div>

  <header class="header">
    <a href="index.html" class="logo">
      <span class="logo-bracket">[</span><span class="logo-text">CYBER_BLOG</span><span class="logo-bracket">]</span>
    </a>
    <nav class="nav">
      <a href="index.html" class="nav-link active">Posts</a>
      <a href="#about" class="nav-link">About</a>
    </nav>
  </header>

  <main class="main">
    <section class="hero">
      <h1 class="hero-title">
        <span class="hero-line">>_ SYSTEM ONLINE</span>
        <span class="hero-sub">Thoughts from the grid</span>
      </h1>
    </section>

    <section class="posts" id="posts">
      <div class="posts-loading" id="postsLoading">
        <span class="loading-dots">Loading posts</span>
        <span class="loading-cursor">_</span>
      </div>
      <div class="posts-list" id="postsList"></div>
    </section>

    <section class="about" id="about">
      <h2 class="section-title">&lt;about&gt;</h2>
      <p class="about-text">
        A minimal blog built for GitHub Pages. Edit <code>posts.json</code> to add new entries—no build step required.
      </p>
    </section>
  </main>

  <footer class="footer">
    <span class="footer-text">// Hosted on GitHub Pages</span>
    <span class="footer-year" id="year"></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
